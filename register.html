<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - GUSTAVO Online Shopping</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-shopping-cart"></i> GUSTAVO Online Shopping
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                </ul>
                
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">Login</a>
                    </li>
                    <li class="nav-item" id="dashboardNavItem" style="display: none;">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="register.html">Register</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Flash Messages -->
    <div class="container mt-3">
        <div id="flashMessages"></div>
    </div>

    <!-- Main Content -->
    <main class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header text-center">
                        <h4><i class="fas fa-user-plus"></i> Create Your Account</h4>
                    </div>
                    <div class="card-body">
                        <form id="registerForm" onsubmit="handleRegister(event)">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                                    <input type="text" class="form-control" id="username" name="username" required minlength="3">
                                </div>
                                <div class="invalid-feedback" id="usernameError"></div>
                                <small class="form-text text-muted">Minimum 3 characters</small>
                            </div>
                            
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                    <input type="email" class="form-control" id="email" name="email" required>
                                </div>
                                <div class="invalid-feedback" id="emailError"></div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" class="form-control" id="password" name="password" required minlength="6">
                                </div>
                                <div class="invalid-feedback" id="passwordError"></div>
                                <small class="form-text text-muted">Minimum 6 characters</small>
                            </div>
                            
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">Confirm Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                                </div>
                                <div class="invalid-feedback" id="confirmPasswordError"></div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="phone" class="form-label">Phone Number</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                    <input type="tel" class="form-control" id="phone" name="phone" placeholder="+256783632089">
                                </div>
                                <div class="invalid-feedback" id="phoneError"></div>
                                <small class="form-text text-muted">Optional, for delivery notifications</small>
                            </div>
                            
                            <div class="mb-3">
                                <label for="address" class="form-label">Delivery Address</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-home"></i></span>
                                    <textarea class="form-control" id="address" name="address" rows="2" placeholder="123 Street, City, Country"></textarea>
                                </div>
                                <div class="invalid-feedback" id="addressError"></div>
                                <small class="form-text text-muted">Optional, for delivery</small>
                            </div>
                            
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="agreeTerms" required>
                                <label class="form-check-label" for="agreeTerms">
                                    I agree to the <a href="#" onclick="showTerms()">Terms and Conditions</a>
                                </label>
                                <div class="invalid-feedback" id="termsError"></div>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary" id="registerBtn">
                                    <i class="fas fa-user-plus"></i> Register
                                </button>
                            </div>
                        </form>
                        
                        <div class="text-center mt-3">
                            <p>Already have an account? <a href="login.html">Login here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-light mt-5 py-4">
        <div class="container text-center">
            <p>&copy; 2024 GUSTAVO Online Shopping. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/messages.js"></script>
    <script>
        // Handle registration form submission
        function handleRegister(event) {
            event.preventDefault();
            
            const formData = {
                username: document.getElementById('username').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
                confirmPassword: document.getElementById('confirmPassword').value,
                phone: document.getElementById('phone').value.trim(),
                address: document.getElementById('address').value.trim()
            };
            
            const registerBtn = document.getElementById('registerBtn');
            
            // Clear previous errors
            clearErrors();
            
            // Validate form
            let isValid = validateRegistrationForm(formData);
            
            if (!isValid) return;
            
            // Show loading state
            registerBtn.innerHTML = '<span class="loading-spinner"></span> Creating Account...';
            registerBtn.disabled = true;
            
            // Attempt registration
            setTimeout(() => {
                const result = window.auth.register({
                    username: formData.username,
                    email: formData.email,
                    password: formData.password,
                    phone: formData.phone,
                    address: formData.address
                });
                
                if (result.success) {
                    window.auth.flashMessage(result.message, 'success');
                    
                    // Redirect to login after successful registration
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showError('usernameError', result.message);
                    registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Register';
                    registerBtn.disabled = false;
                }
            }, 1000);
        }
        
        // Validate registration form
        function validateRegistrationForm(data) {
            let isValid = true;
            
            // Username validation
            if (!data.username) {
                showError('usernameError', 'Username is required');
                isValid = false;
            } else if (data.username.length < 3) {
                showError('usernameError', 'Username must be at least 3 characters');
                isValid = false;
            }
            
            // Email validation
            if (!data.email) {
                showError('emailError', 'Email is required');
                isValid = false;
            } else if (!isValidEmail(data.email)) {
                showError('emailError', 'Please enter a valid email address');
                isValid = false;
            }
            
            // Password validation
            if (!data.password) {
                showError('passwordError', 'Password is required');
                isValid = false;
            } else if (data.password.length < 6) {
                showError('passwordError', 'Password must be at least 6 characters');
                isValid = false;
            }
            
            // Confirm password validation
            if (!data.confirmPassword) {
                showError('confirmPasswordError', 'Please confirm your password');
                isValid = false;
            } else if (data.password !== data.confirmPassword) {
                showError('confirmPasswordError', 'Passwords do not match');
                isValid = false;
            }
            
            // Phone validation (optional)
            if (data.phone && !isValidPhone(data.phone)) {
                showError('phoneError', 'Please enter a valid phone number');
                isValid = false;
            }
            
            // Terms validation
            if (!document.getElementById('agreeTerms').checked) {
                showError('termsError', 'You must agree to the terms and conditions');
                isValid = false;
            }
            
            return isValid;
        }
        
        // Email validation helper
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }
        
        // Phone validation helper
        function isValidPhone(phone) {
            return /^[\d\s\-\+\(\)]+$/.test(phone) && phone.replace(/\D/g, '').length >= 10;
        }
        
        // Show error message
        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            const inputElement = errorElement.previousElementSibling.querySelector('input, textarea');
            
            errorElement.textContent = message;
            inputElement.classList.add('is-invalid');
        }
        
        // Clear all error messages
        function clearErrors() {
            const errorElements = document.querySelectorAll('.invalid-feedback');
            const inputElements = document.querySelectorAll('.is-invalid');
            
            errorElements.forEach(element => {
                element.textContent = '';
            });
            
            inputElements.forEach(element => {
                element.classList.remove('is-invalid');
            });
        }
        
        // Show terms and conditions (demo)
        function showTerms() {
            window.auth.flashMessage('Terms and Conditions: By using ShopHub, you agree to our terms of service and privacy policy.', 'info');
        }
        
        // Check if user is already logged in
        document.addEventListener('DOMContentLoaded', function() {
            if (window.auth.isLoggedIn()) {
                window.auth.flashMessage('You are already logged in!', 'info');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            }
        });
        
        // Real-time validation
        document.getElementById('username').addEventListener('blur', function() {
            const username = this.value.trim();
            if (username && username.length < 3) {
                showError('usernameError', 'Username must be at least 3 characters');
            } else {
                this.classList.remove('is-invalid');
                document.getElementById('usernameError').textContent = '';
            }
        });
        
        document.getElementById('email').addEventListener('blur', function() {
            const email = this.value.trim();
            if (email && !isValidEmail(email)) {
                showError('emailError', 'Please enter a valid email address');
            } else {
                this.classList.remove('is-invalid');
                document.getElementById('emailError').textContent = '';
            }
        });
        
        document.getElementById('password').addEventListener('blur', function() {
            const password = this.value;
            if (password && password.length < 6) {
                showError('passwordError', 'Password must be at least 6 characters');
            } else {
                this.classList.remove('is-invalid');
                document.getElementById('passwordError').textContent = '';
            }
        });
        
        document.getElementById('confirmPassword').addEventListener('blur', function() {
            const password = document.getElementById('password').value;
            const confirmPassword = this.value;
            if (confirmPassword && password !== confirmPassword) {
                showError('confirmPasswordError', 'Passwords do not match');
            } else {
                this.classList.remove('is-invalid');
                document.getElementById('confirmPasswordError').textContent = '';
            }
        });
    </script>
</body>
</html>
