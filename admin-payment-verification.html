<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Verification - GUSTAVO Online Shopping Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-shopping-cart"></i> GUSTAVO Online Shopping
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle active" href="#" id="adminDropdown" role="button" data-bs-toggle="dropdown">
                            Admin
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item active" href="admin-payment-verification.html">Payment Verification</a></li>
                            <li><a class="dropdown-item" href="admin-orders.html">Orders</a></li>
                            <li><a class="dropdown-item" href="admin-messages.html">Messages</a></li>
                        </ul>
                    </li>
                </ul>
                
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdownLink" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user"></i> <span id="usernameDisplay">Admin</span>
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="dashboard.html">My Dashboard</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" onclick="logout()">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Flash Messages -->
    <div class="container mt-3">
        <div id="flashMessages"></div>
    </div>

    <!-- Main Content -->
    <main class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-credit-card"></i> Payment Verification</h2>
            <button class="btn btn-outline-secondary" onclick="refreshPayments()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>

        <!-- Filter Tabs -->
        <ul class="nav nav-tabs mb-4" id="paymentTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="pending-tab" data-bs-toggle="tab" data-bs-target="#pending" type="button" role="tab">
                    Pending <span class="badge bg-warning" id="pendingCount">0</span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="approved-tab" data-bs-toggle="tab" data-bs-target="#approved" type="button" role="tab">
                    Approved <span class="badge bg-success" id="approvedCount">0</span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="rejected-tab" data-bs-toggle="tab" data-bs-target="#rejected" type="button" role="tab">
                    Rejected <span class="badge bg-danger" id="rejectedCount">0</span>
                </button>
            </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content" id="paymentTabContent">
            <!-- Pending Payments -->
            <div class="tab-pane fade show active" id="pending" role="tabpanel">
                <div id="pendingPayments">
                    <!-- Pending payments will be loaded here -->
                </div>
            </div>

            <!-- Approved Payments -->
            <div class="tab-pane fade" id="approved" role="tabpanel">
                <div id="approvedPayments">
                    <!-- Approved payments will be loaded here -->
                </div>
            </div>

            <!-- Rejected Payments -->
            <div class="tab-pane fade" id="rejected" role="tabpanel">
                <div id="rejectedPayments">
                    <!-- Rejected payments will be loaded here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Payment Review Modal -->
    <div class="modal fade" id="paymentModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Payment Review</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="paymentModalBody">
                    <!-- Payment details will be loaded here -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" onclick="rejectPayment()">
                        <i class="fas fa-times"></i> Reject
                    </button>
                    <button type="button" class="btn btn-success" onclick="approvePayment()">
                        <i class="fas fa-check"></i> Approve
                    </button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-light mt-5 py-4">
        <div class="container text-center">
            <p>&copy; 2024 GUSTAVO Online Shopping. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/messages.js"></script>
    <script>
        let currentPaymentId = null;

        // Load all payments
        function loadPayments() {
            const payments = JSON.parse(localStorage.getItem('paymentConfirmations')) || [];
            
            // Filter payments by status
            const pendingPayments = payments.filter(p => p.verificationStatus === 'Pending');
            const approvedPayments = payments.filter(p => p.verificationStatus === 'Approved');
            const rejectedPayments = payments.filter(p => p.verificationStatus === 'Rejected');
            
            // Update counts
            document.getElementById('pendingCount').textContent = pendingPayments.length;
            document.getElementById('approvedCount').textContent = approvedPayments.length;
            document.getElementById('rejectedCount').textContent = rejectedPayments.length;
            
            // Load payments into tabs
            loadPaymentList('pendingPayments', pendingPayments);
            loadPaymentList('approvedPayments', approvedPayments);
            loadPaymentList('rejectedPayments', rejectedPayments);
        }

        // Load payment list into container
        function loadPaymentList(containerId, payments) {
            const container = document.getElementById(containerId);
            
            if (payments.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5">
                        <i class="fas fa-credit-card fa-3x text-muted mb-3"></i>
                        <h5>No ${containerId.replace('Payments', '').toLowerCase()} payments</h5>
                        <p class="text-muted">No payments found in this category</p>
                    </div>
                `;
                return;
            }
            
            let paymentsHtml = '';
            payments.forEach(payment => {
                const order = getOrderById(payment.orderId);
                const user = getUserById(order ? order.userId : null);
                
                paymentsHtml += `
                    <div class="card mb-3">
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-8">
                                    <h6>Order #${order ? order.id : 'Unknown'}</h6>
                                    <p class="mb-1"><strong>Customer:</strong> ${user ? user.username : 'Unknown'}</p>
                                    <p class="mb-1"><strong>Payment Method:</strong> ${formatPaymentMethod(payment.paymentMethod)}</p>
                                    <p class="mb-1"><strong>Amount:</strong> ${order ? window.products.formatPrice(order.total) : 'Unknown'}</p>
                                    <p class="mb-1"><strong>Transaction ID:</strong> ${payment.transactionId || 'N/A'}</p>
                                    <p class="mb-0"><strong>Submitted:</strong> ${formatDate(payment.submittedAt)}</p>
                                </div>
                                <div class="col-md-4 text-end">
                                    <span class="badge ${getStatusClass(payment.verificationStatus)}">${payment.verificationStatus}</span>
                                    <br><br>
                                    <button class="btn btn-sm btn-outline-primary" onclick="viewPaymentDetails('${payment.orderId}')">
                                        <i class="fas fa-eye"></i> View Details
                                    </button>
                                    ${payment.verificationStatus === 'Pending' ? `
                                        <button class="btn btn-sm btn-success ms-1" onclick="quickApprove('${payment.orderId}')">
                                            <i class="fas fa-check"></i> Approve
                                        </button>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = paymentsHtml;
        }

        // Get order by ID
        function getOrderById(orderId) {
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            return orders.find(o => o.id === orderId);
        }

        // Get user by ID
        function getUserById(userId) {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            return users.find(u => u.id === userId);
        }

        // Format payment method
        function formatPaymentMethod(method) {
            const methods = {
                'mpesa': 'M-Pesa',
                'bank': 'Bank Transfer',
                'card': 'Credit/Debit Card'
            };
            return methods[method] || method;
        }

        // Get status class
        function getStatusClass(status) {
            switch(status.toLowerCase()) {
                case 'pending':
                    return 'bg-warning';
                case 'approved':
                    return 'bg-success';
                case 'rejected':
                    return 'bg-danger';
                default:
                    return 'bg-secondary';
            }
        }

        // Format date
        function formatDate(timestamp) {
            return new Date(timestamp).toLocaleDateString() + ' ' + new Date(timestamp).toLocaleTimeString();
        }

        // View payment details
        function viewPaymentDetails(orderId) {
            const payments = JSON.parse(localStorage.getItem('paymentConfirmations')) || [];
            const payment = payments.find(p => p.orderId === orderId);
            
            if (!payment) {
                window.auth.flashMessage('Payment not found', 'error');
                return;
            }
            
            currentPaymentId = payment.orderId;
            
            const order = getOrderById(payment.orderId);
            const user = getUserById(order ? order.userId : null);
            
            const modalBody = document.getElementById('paymentModalBody');
            
            let detailsHtml = `
                <div class="row">
                    <div class="col-md-6">
                        <h6>Order Information</h6>
                        <p><strong>Order ID:</strong> ${order ? order.id : 'Unknown'}</p>
                        <p><strong>Customer:</strong> ${user ? user.username : 'Unknown'}</p>
                        <p><strong>Email:</strong> ${user ? user.email : 'Unknown'}</p>
                        <p><strong>Phone:</strong> ${user ? user.phone : 'Unknown'}</p>
                        <p><strong>Amount:</strong> ${order ? window.products.formatPrice(order.total) : 'Unknown'}</p>
                        <p><strong>Order Date:</strong> ${order ? formatDate(order.createdAt) : 'Unknown'}</p>
                    </div>
                    <div class="col-md-6">
                        <h6>Payment Information</h6>
                        <p><strong>Payment Method:</strong> ${formatPaymentMethod(payment.paymentMethod)}</p>
                        <p><strong>Transaction ID:</strong> ${payment.transactionId || 'N/A'}</p>
                        <p><strong>Phone Number:</strong> ${payment.phoneNumber || 'N/A'}</p>
                        <p><strong>Account Name:</strong> ${payment.accountName || 'N/A'}</p>
                        <p><strong>Submitted:</strong> ${formatDate(payment.submittedAt)}</p>
                        <p><strong>Status:</strong> <span class="badge ${getStatusClass(payment.verificationStatus)}">${payment.verificationStatus}</span></p>
                    </div>
                </div>
            `;
            
            if (payment.paymentNotes) {
                detailsHtml += `
                    <hr>
                    <h6>Payment Notes</h6>
                    <p>${payment.paymentNotes}</p>
                `;
            }
            
            if (order && order.items) {
                detailsHtml += `
                    <hr>
                    <h6>Order Items</h6>
                    <div class="table-responsive">
                        <table class="table table-sm">
                            <thead>
                                <tr>
                                    <th>Product</th>
                                    <th>Quantity</th>
                                    <th>Price</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                
                order.items.forEach(item => {
                    detailsHtml += `
                        <tr>
                            <td>${item.product ? item.product.name : 'Unknown'}</td>
                            <td>${item.quantity}</td>
                            <td>${item.product ? window.products.formatPrice(item.product.price) : 'N/A'}</td>
                            <td>${window.products.formatPrice(item.totalPrice)}</td>
                        </tr>
                    `;
                });
                
                detailsHtml += `
                            </tbody>
                        </table>
                    </div>
                `;
            }
            
            modalBody.innerHTML = detailsHtml;
            
            // Show modal
            const modal = new bootstrap.Modal(document.getElementById('paymentModal'));
            modal.show();
        }

        // Quick approve payment
        function quickApprove(orderId) {
            currentPaymentId = orderId;
            if (confirm('Are you sure you want to approve this payment?')) {
                approvePayment();
            }
        }

        // Approve payment
        function approvePayment() {
            if (!currentPaymentId) return;
            
            const payments = JSON.parse(localStorage.getItem('paymentConfirmations')) || [];
            const paymentIndex = payments.findIndex(p => p.orderId === currentPaymentId);
            
            if (paymentIndex === -1) {
                window.auth.flashMessage('Payment not found', 'error');
                return;
            }
            
            // Update payment status
            payments[paymentIndex].verificationStatus = 'Approved';
            payments[paymentIndex].verifiedAt = new Date().toISOString();
            payments[paymentIndex].verifiedBy = window.auth.getCurrentUser().id;
            
            localStorage.setItem('paymentConfirmations', JSON.stringify(payments));
            
            // Update order status
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const orderIndex = orders.findIndex(o => o.id === currentPaymentId);
            
            if (orderIndex > -1) {
                orders[orderIndex].paymentStatus = 'Approved';
                orders[orderIndex].status = 'Payment Approved';
                localStorage.setItem('orders', JSON.stringify(orders));
            }
            
            // Close modal and refresh
            const modal = bootstrap.Modal.getInstance(document.getElementById('paymentModal'));
            modal.hide();
            
            loadPayments();
            window.auth.flashMessage('Payment approved successfully', 'success');
        }

        // Reject payment
        function rejectPayment() {
            if (!currentPaymentId) return;
            
            const reason = prompt('Please provide a reason for rejection:');
            if (!reason) return;
            
            const payments = JSON.parse(localStorage.getItem('paymentConfirmations')) || [];
            const paymentIndex = payments.findIndex(p => p.orderId === currentPaymentId);
            
            if (paymentIndex === -1) {
                window.auth.flashMessage('Payment not found', 'error');
                return;
            }
            
            // Update payment status
            payments[paymentIndex].verificationStatus = 'Rejected';
            payments[paymentIndex].verifiedAt = new Date().toISOString();
            payments[paymentIndex].verifiedBy = window.auth.getCurrentUser().id;
            payments[paymentIndex].adminNotes = reason;
            
            localStorage.setItem('paymentConfirmations', JSON.stringify(payments));
            
            // Update order status
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const orderIndex = orders.findIndex(o => o.id === currentPaymentId);
            
            if (orderIndex > -1) {
                orders[orderIndex].paymentStatus = 'Rejected';
                orders[orderIndex].status = 'Payment Rejected';
                localStorage.setItem('orders', JSON.stringify(orders));
            }
            
            // Close modal and refresh
            const modal = bootstrap.Modal.getInstance(document.getElementById('paymentModal'));
            modal.hide();
            
            loadPayments();
            window.auth.flashMessage('Payment rejected', 'warning');
        }

        // Refresh payments
        function refreshPayments() {
            loadPayments();
            window.auth.flashMessage('Payments refreshed', 'info');
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Check admin authentication
            if (!window.auth.requireAdmin()) {
                return;
            }
            
            // Update UI
            window.auth.updateAuthUI();
            document.getElementById('usernameDisplay').textContent = window.auth.getCurrentUser().username;
            
            // Load payments
            loadPayments();
        });
    </script>
</body>
</html>
